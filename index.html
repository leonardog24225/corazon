<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>❤️ Night Changes - One Direction 💫</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Georgia', serif;
            touch-action: none;
            user-select: none;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: pointer;
        }

        canvas:active {
            cursor: grabbing;
        }

        .welcome {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.10);
            font-size: 1.2rem;
            letter-spacing: 4px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            animation: fadeOut 6s forwards;
            font-family: 'Arial', sans-serif;
            text-shadow: 0 0 30px rgba(255, 0, 100, 0.15);
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }

        .star-counter {
            position: fixed;
            bottom: 30px;
            right: 30px;
            color: rgba(255, 200, 220, 0.15);
            font-size: 0.8rem;
            font-family: 'Arial', sans-serif;
            letter-spacing: 2px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(255, 0, 100, 0.1);
        }

        .hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.05);
            font-size: 0.7rem;
            font-family: 'Arial', sans-serif;
            letter-spacing: 3px;
            z-index: 10;
            pointer-events: none;
            animation: pulseHint 4s infinite;
            white-space: nowrap;
        }

        @keyframes pulseHint {
            0%, 100% { opacity: 0.05; }
            50% { opacity: 0.18; }
        }

        .music-control {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            padding: 10px 25px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            font-family: 'Arial', sans-serif;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .music-control:hover {
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.8);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateX(-50%) scale(1.05);
        }

        .music-control .icon {
            font-size: 1rem;
        }

        .music-control .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ff3366;
            display: inline-block;
            animation: pulseDot 1.5s ease-in-out infinite;
        }

        @keyframes pulseDot {
            0%,
            100% {
                opacity: 0.3;
                transform: scale(0.8);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .music-control.paused .status-dot {
            animation: none;
            background: #666;
            opacity: 0.5;
        }

        .music-progress {
            position: fixed;
            bottom: 65px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 29;
            width: 250px;
            height: 3px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .music-progress.active {
            opacity: 1;
        }

        .music-progress .bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff3366, #ff6699);
            border-radius: 3px;
            transition: width 0.3s linear;
        }

        .dynamic-phrases {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
            overflow: hidden;
        }

        .floating-phrase {
            position: absolute;
            font-weight: bold;
            font-family: 'Georgia', 'Times New Roman', serif;
            text-shadow:
                0 0 30px rgba(255, 50, 100, 0.6),
                0 0 60px rgba(255, 50, 100, 0.3),
                0 0 100px rgba(255, 0, 80, 0.15);
            white-space: nowrap;
            animation: floatAndFade var(--duration) ease-out forwards;
            transform-origin: center;
            letter-spacing: 2px;
        }

        @keyframes floatAndFade {
            0% {
                opacity: 0;
                transform: translate(0, 0) scale(0.3) rotate(0deg);
            }
            15% {
                opacity: 1;
                transform: translate(var(--tx1), var(--ty1)) scale(1.1) rotate(var(--rot1));
            }
            50% {
                opacity: 1;
                transform: translate(var(--tx2), var(--ty2)) scale(1) rotate(var(--rot2));
            }
            85% {
                opacity: 0.8;
                transform: translate(var(--tx3), var(--ty3)) scale(0.9) rotate(var(--rot3));
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx4), var(--ty4)) scale(0.5) rotate(var(--rot4));
            }
        }

        .phrase-sparkles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 19;
        }

            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, #ff6b9d, #ff3366);
            box-shadow: 0 0 20px rgba(255, 50, 100, 0.6);
            animation: sparkleBurst var(--duration) ease-out forwards;
        }

        @keyframes sparkleBurst {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--sx), var(--sy)) scale(0);
                opacity: 0;
            }
        }

            position: fixed;
            bottom: -100px;
            left: -100px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>

                console.log('❌ Error al cargar audio:', e);

                            updateUI(true);
                            console.log('🎵 Reproduciendo Night Changes (local)');

            function shuffleArray(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            function getPhraseForParticle(index) {
                return shuffledPhrases[index % shuffledPhrases.length];

            const CONFIG = {
                starCount: 4000,
                heartParticles: 2500,
                wordCount: 100,

            // ---------- CREAR ESTRELLAS ----------
            function createBackgroundStars() {
                const geometry = new THREE.BufferGeometry();
                const count = CONFIG.starCount;
                const positions = new Float32Array(count * 3);
                const sizes = new Float32Array(count);
                const colors = new Float32Array(count * 3);

                for (let i = 0; i < count; i++) {
                    const radius = 20 + Math.random() * 80;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2 * Math.random() - 1);

                    positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                    positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                    positions[i * 3 + 2] = radius * Math.cos(phi);

                    sizes[i] = 0.1 + Math.random() * 0.5;
                    const color = new THREE.Color();
                    color.setHSL(0.6 + Math.random() * 0.2, 0.3, 0.5 + Math.random() * 0.5);
                    colors[i * 3] = color.r;
                    colors[i * 3 + 1] = color.g;
                    colors[i * 3 + 2] = color.b;
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
                geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

                const material = new THREE.PointsMaterial({
                    size: 0.15,
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.8,
                    sizeAttenuation: true,
                    blending: THREE.AdditiveBlending
                });

                const stars = new THREE.Points(geometry, material);
                scene.add(stars);
                return stars;
            }

            // ---------- CREAR CORAZÓN ----------

            function createHeart() {
                const count = CONFIG.heartParticles;
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(count * 3);
                const colors = new Float32Array(count * 3);
                const sizes = new Float32Array(count);
                const targets = new Float32Array(count * 3);

                const scale = 0.12;

                for (let i = 0; i < count; i++) {
                    let t = Math.random() * 2 * Math.PI;
                    let noise = 0.75 + Math.random() * 0.5;

                    let x = 16 * Math.pow(Math.sin(t), 3) * noise;
                    let y = (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) * noise;
                    let z = (Math.random() - 0.5) * 2.5 * noise;

                    targets[i * 3] = x * scale;
                    targets[i * 3 + 1] = y * scale;
                    targets[i * 3 + 2] = z * scale;

                    positions[i * 3] = targets[i * 3] + (Math.random() - 0.5) * 0.3;
                    positions[i * 3 + 1] = targets[i * 3 + 1] + (Math.random() - 0.5) * 0.3;
                    positions[i * 3 + 2] = targets[i * 3 + 2] + (Math.random() - 0.5) * 0.3;

                    sizes[i] = 0.02 + Math.random() * 0.06;

                    const color = new THREE.Color();
                    const hue = 0.9 + Math.random() * 0.1;
                    const saturation = 0.6 + Math.random() * 0.4;
                    const lightness = 0.5 + Math.random() * 0.5;
                    color.setHSL(hue, saturation, lightness);
                    colors[i * 3] = color.r;
                    colors[i * 3 + 1] = color.g;
                    colors[i * 3 + 2] = color.b;
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

                const material = new THREE.PointsMaterial({

                    transparent: true,
                    opacity: 0.95,
                    sizeAttenuation: true,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                });

                const heart = new THREE.Points(geometry, material);
                heart.userData.targets = targets;
                heart.userData.positions = positions;

                heartParticles = [];
                for (let i = 0; i < count; i++) {
                    heartParticles.push({
                        index: i,
                        position: new THREE.Vector3(positions[i * 3], positions[i * 3 + 1], positions[i * 3 + 2]),
                        phrase: getPhraseForParticle(i)
                    });
                }

                scene.add(heart);
                return heart;
            }

            // ---------- CREAR PALABRAS FLOTANTES ----------
            function createFloatingWords() {
                const group = new THREE.Group();
                const wordObjects = [];
                const count = CONFIG.wordCount;

                function createWordTexture(text, color) {
                    const canvas = document.createElement('canvas');
                    const size = 256;
                    canvas.width = size;
                    canvas.height = size;
                    const ctx = canvas.getContext('2d');

                    ctx.clearRect(0, 0, size, size);
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.shadowColor = 'rgba(255, 50, 100, 0.3)';
                    ctx.shadowBlur = 20;

                    const fontSize = 24 + Math.random() * 20;
                    ctx.font = `bold ${fontSize}px 'Georgia', 'Times New Roman', serif`;
                    ctx.fillStyle = color;
                    ctx.fillText(text, size / 2, size / 2);

                    ctx.shadowBlur = 40;
                    ctx.shadowColor = 'rgba(255, 50, 100, 0.1)';
                    ctx.fillText(text, size / 2, size / 2);

                    return new THREE.CanvasTexture(canvas);
                }

                for (let i = 0; i < count; i++) {
                    const word = ALL_PHRASES[Math.floor(Math.random() * ALL_PHRASES.length)];
                    const hue = 0.9 + Math.random() * 0.12;
                    const colorStr =
                        `hsl(${hue * 360}, ${70 + Math.random() * 30}%, ${60 + Math.random() * 30}%)`;

                    const texture = createWordTexture(word, colorStr);
                    const material = new THREE.SpriteMaterial({
                        map: texture,
                        transparent: true,
                        opacity: 0.5 + Math.random() * 0.3,
                        blending: THREE.AdditiveBlending,
                        depthWrite: false
                    });

                    const sprite = new THREE.Sprite(material);

                    const radius = 1.2 + Math.random() * 1.8;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2 * Math.random() - 1);

                    sprite.position.set(
                        radius * Math.sin(phi) * Math.cos(theta),
                        radius * Math.sin(phi) * Math.sin(theta) * 1.2,
                        radius * Math.cos(phi)
                    );

                    const scale = 0.15 + Math.random() * 0.25;
                    sprite.scale.set(scale, scale, 1);

                    sprite.userData = {
                        theta: theta,
                        phi: phi,
                        radius: radius,
                        speed: 0.0005 + Math.random() * 0.0015,
                        floatOffset: Math.random() * Math.PI * 2,
                        floatSpeed: 0.5 + Math.random() * 0.5,
                        baseOpacity: 0.5 + Math.random() * 0.3,
                        rotationSpeed: (Math.random() - 0.5) * 0.002
                    };

                    group.add(sprite);
                    wordObjects.push(sprite);
                }

                scene.add(group);
                return { group, wordObjects };
            }

            // ---------- CREAR NEBULOSA ----------
            function createNebula() {
                const geometry = new THREE.BufferGeometry();
                const count = 800;
                const positions = new Float32Array(count * 3);
                const colors = new Float32Array(count * 3);

                for (let i = 0; i < count; i++) {
                    const radius = 3 + Math.random() * 8;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2 * Math.random() - 1);

                    positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                    positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta) * 0.6;
                    positions[i * 3 + 2] = radius * Math.cos(phi);

                    const color = new THREE.Color();
                    color.setHSL(0.85 + Math.random() * 0.2, 0.3, 0.05 + Math.random() * 0.1);
                    colors[i * 3] = color.r;
                    colors[i * 3 + 1] = color.g;
                    colors[i * 3 + 2] = color.b;
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

                const material = new THREE.PointsMaterial({
                    size: 0.3,
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.3,
                    sizeAttenuation: true,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                });

                const nebula = new THREE.Points(geometry, material);
                scene.add(nebula);
                return nebula;
            }

            // ---------- MOSTRAR FRASE DINÁMICA ----------
            function showDynamicPhrase(phrase, x, y) {
                const container = document.getElementById('dynamicPhrases');
                const sparklesContainer = document.getElementById('phraseSparkles');

                const el = document.createElement('div');
                el.className = 'floating-phrase';
                el.textContent = phrase;

                const hue = 330 + Math.random() * 30;
                const lightness = 65 + Math.random() * 25;
                el.style.color = `hsl(${hue}, 100%, ${lightness}%)`;
                el.style.fontSize = `${16 + Math.random() * 28}px`;

                const angle = Math.random() * Math.PI * 2;
                const distance = 80 + Math.random() * 200;
                const angle2 = angle + (Math.random() - 0.5) * 1.5;
                const distance2 = distance * (0.5 + Math.random() * 0.5);
                const angle3 = angle2 + (Math.random() - 0.5) * 1.5;
                const distance3 = distance2 * (0.5 + Math.random() * 0.5);
                const angle4 = angle3 + (Math.random() - 0.5) * 1;
                const distance4 = distance3 * (0.3 + Math.random() * 0.3);

                const duration = 2.5 + Math.random() * 1.5;

                el.style.setProperty('--tx1', `${Math.cos(angle) * distance * 0.3}px`);
                el.style.setProperty('--ty1', `${Math.sin(angle) * distance * 0.3 - 20}px`);
                el.style.setProperty('--tx2', `${Math.cos(angle2) * distance2 * 0.6}px`);
                el.style.setProperty('--ty2', `${Math.sin(angle2) * distance2 * 0.6 - 40}px`);
                el.style.setProperty('--tx3', `${Math.cos(angle3) * distance3 * 0.8}px`);
                el.style.setProperty('--ty3', `${Math.sin(angle3) * distance3 * 0.8 - 60}px`);
                el.style.setProperty('--tx4', `${Math.cos(angle4) * distance4}px`);
                el.style.setProperty('--ty4', `${Math.sin(angle4) * distance4 - 80}px`);

                el.style.setProperty('--rot1', `${(Math.random() - 0.5) * 20}deg`);
                el.style.setProperty('--rot2', `${(Math.random() - 0.5) * 30}deg`);
                el.style.setProperty('--rot3', `${(Math.random() - 0.5) * 25}deg`);
                el.style.setProperty('--rot4', `${(Math.random() - 0.5) * 35}deg`);

                el.style.setProperty('--duration', `${duration}s`);

                el.style.left = `${x - 50}px`;
                el.style.top = `${y - 20}px`;

                container.appendChild(el);

                setTimeout(() => {
                    el.remove();
                }, duration * 1000 + 100);

                // CHISPAS
                const sparkleCount = 15 + Math.floor(Math.random() * 20);
                for (let i = 0; i < sparkleCount; i++) {
                    const sparkle = document.createElement('div');
                    sparkle.className = 'sparkle';

                    const size = 2 + Math.random() * 5;
                    const sAngle = Math.random() * Math.PI * 2;
                    const sDistance = 30 + Math.random() * 150;
                    const sDuration = 0.8 + Math.random() * 0.8;

                    sparkle.style.width = `${size}px`;
                    sparkle.style.height = `${size}px`;
                    sparkle.style.left = `${x + (Math.random() - 0.5) * 20}px`;
                    sparkle.style.top = `${y + (Math.random() - 0.5) * 20}px`;
                    sparkle.style.setProperty('--sx', `${Math.cos(sAngle) * sDistance}px`);
                    sparkle.style.setProperty('--sy', `${Math.sin(sAngle) * sDistance}px`);
                    sparkle.style.setProperty('--duration', `${sDuration}s`);

                    const sparkleHue = 330 + Math.random() * 30;
                    sparkle.style.background = `radial-gradient(circle, 
                        hsl(${sparkleHue}, 100%, 80%), 
                        hsl(${sparkleHue}, 100%, 50%))`;

                    sparklesContainer.appendChild(sparkle);

                    setTimeout(() => {
                        sparkle.remove();
                    }, sDuration * 1000 + 100);
                }

                const counter = document.getElementById('starCounter');
                const current = parseInt(counter.textContent) || 0;
                counter.textContent = `✦ ${current + 1} frases descubiertas`;
            }

            // ---------- DETECTAR CLIC ----------
            function handleClick(event) {
                const rect = canvas.getBoundingClientRect();
                let clientX, clientY;

                if (event.touches) {
                    clientX = event.touches[0].clientX;
                    clientY = event.touches[0].clientY;
                    event.preventDefault();
                } else {
                    clientX = event.clientX;
                    clientY = event.clientY;
                }

                mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);

                if (heartMesh) {
                    const intersects = raycaster.intersectObject(heartMesh);

                    if (intersects.length > 0) {
                        const hit = intersects[0];
                        const index = hit.index;

                        if (index !== undefined && index < heartParticles.length) {
                            const particle = heartParticles[index];
                            const phrase = particle.phrase;

                            const posX = clientX;
                            const posY = clientY;

                            showDynamicPhrase(phrase, posX, posY);
                        }
                    }
                }
            }

            // ---------- VARIABLES DE CONTROL ----------
            let isDragging = false;
            let previousMouse = { x: 0, y: 0 };
            let rotation = { x: 0, y: 0 };
            let targetRotation = { x: 0, y: 0 };
            let autoRotate = true;
            let heartMesh = null;

            // ---------- INICIALIZAR ----------
            const stars = createBackgroundStars();
            heartMesh = createHeart();
            const nebula = createNebula();
            const { group: wordGroup, wordObjects } = createFloatingWords();

            // ---------- EVENTOS ----------
            canvas.addEventListener('click', handleClick);
            canvas.addEventListener('touchstart', function(e) {
                if (e.touches.length === 1) {
                    handleClick(e);
                }
            }, { passive: false });

            function getPointerPosition(e) {
                if (e.touches) {
                    return { x: e.touches[0].clientX, y: e.touches[0].clientY };
                }
                return { x: e.clientX, y: e.clientY };
            }

            function onPointerDown(e) {
                const pos = getPointerPosition(e);
                isDragging = true;
                previousMouse.x = pos.x;
                previousMouse.y = pos.y;
                autoRotate = false;
                canvas.style.cursor = 'grabbing';
                if (e.touches) e.preventDefault();
            }

            function onPointerMove(e) {
                const pos = getPointerPosition(e);
                if (isDragging) {
                    const deltaX = pos.x - previousMouse.x;
                    const deltaY = pos.y - previousMouse.y;

                    targetRotation.y += deltaX * 0.008;
                    targetRotation.x += deltaY * 0.008;
                    targetRotation.x = Math.max(-1.2, Math.min(1.2, targetRotation.x));

                    previousMouse.x = pos.x;
                    previousMouse.y = pos.y;
                }
                if (e.touches) e.preventDefault();
            }

            function onPointerUp(e) {
                isDragging = false;
                canvas.style.cursor = 'pointer';
                setTimeout(() => {
                    if (!isDragging) autoRotate = true;
                }, 3000);
            }

            canvas.addEventListener('mousedown', onPointerDown);
            window.addEventListener('mousemove', onPointerMove);
            window.addEventListener('mouseup', onPointerUp);

            canvas.addEventListener('touchstart', onPointerDown, { passive: false });
            window.addEventListener('touchmove', onPointerMove, { passive: false });
            window.addEventListener('touchend', onPointerUp, { passive: false });

            // ---------- REDIMENSIONAR ----------
            function onResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
            window.addEventListener('resize', onResize);

            // ---------- ANIMACIÓN ----------
            function animate() {
                requestAnimationFrame(animate);

                if (autoRotate) {
                    targetRotation.y += CONFIG.rotationSpeed;
                }

                rotation.x += (targetRotation.x - rotation.x) * 0.08;
                rotation.y += (targetRotation.y - rotation.y) * 0.08;

                const objects = [stars, heartMesh, wordGroup, nebula];
                objects.forEach(obj => {
                    if (obj) {
                        obj.rotation.x = rotation.x;
                        obj.rotation.y = rotation.y;
                        if (obj === nebula) {
                            obj.rotation.z += 0.0002;
                        }
                    }
                });

                if (heartMesh) {
                    const positions = heartMesh.geometry.attributes.position.array;
                    const targets = heartMesh.userData.targets;
                    const time = Date.now() * 0.001;

                    for (let i = 0; i < positions.length; i += 3) {
                        const idx = i / 3;
                        const wave = Math.sin(time * 0.5 + idx * 0.1) * 0.02;
                        positions[i] += (targets[i] + wave - positions[i]) * 0.02;
                        positions[i + 1] += (targets[i + 1] + Math.sin(time * 0.7 + idx * 0.08) * 0.02 - positions[i + 1]) *
                            0.02;
                        positions[i + 2] += (targets[i + 2] + Math.cos(time * 0.6 + idx * 0.09) * 0.02 - positions[i + 2]) *
                            0.02;
                    }
                    heartMesh.geometry.attributes.position.needsUpdate = true;

                    for (let i = 0; i < heartParticles.length; i++) {
                        heartParticles[i].position.set(
                            positions[i * 3],
                            positions[i * 3 + 1],
                            positions[i * 3 + 2]
                        );
                    }
                }

                const time = Date.now() * 0.001;
                wordObjects.forEach((sprite) => {
                    const data = sprite.userData;
                    data.theta += data.speed;
                    const x = data.radius * Math.sin(data.theta) * Math.cos(data.phi);
                    const y = data.radius * Math.sin(data.theta) * Math.sin(data.phi) * 1.2;
                    const z = data.radius * Math.cos(data.theta);

                    const floatY = Math.sin(time * data.floatSpeed + data.floatOffset) * 0.05;
                    sprite.position.set(x, y + floatY, z);

                    const pulse = 0.7 + 0.3 * Math.sin(time * data.floatSpeed + data.floatOffset);
                    sprite.material.opacity = data.baseOpacity * pulse;
                    sprite.material.rotation += data.rotationSpeed;
                });

                stars.rotation.x += 0.00005;
                stars.rotation.y += 0.0001;

                renderer.render(scene, camera);
            }

            animate();

            // Mensaje inicial
            setTimeout(() => {
                const rect = canvas.getBoundingClientRect();
                showDynamicPhrase("✦ TOCA EL CORAZÓN ✦", rect.width / 2, rect.height / 2 - 50);
            }, 1500);

            // Iniciar música automáticamente al primer clic en el canvas
            let musicStarted = false;
            const startMusicOnInteraction = function() {
                if (!musicStarted && !isMusicPlaying) {
                    setTimeout(() => {
                        startMusic();
                        musicStarted = true;
                    }, 300);
                }
            };

            canvas.addEventListener('click', startMusicOnInteraction);
            canvas.addEventListener('touchstart', startMusicOnInteraction);

            console.log('🎵 Cargando "One Direction - Night Changes.mp3" local...');
            console.log('📁 Asegúrate de que el archivo MP3 esté en la misma carpeta que este HTML');
        })();
    </script>
